<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glusco Rush: Food Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #game-canvas { display: block; width: 100vw; height: 50vh; background: linear-gradient(to bottom, #1e293b, #0f172a); }
        .btn-ing { transition: transform 0.1s; user-select: none; }
        .btn-ing:active { transform: scale(0.90); }
        /* Неонове світіння для тексту */
        .neon-text { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #16a34a, 0 0 40px #16a34a; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <canvas id="game-canvas"></canvas>

    <div class="flex-1 bg-stone-900 p-2 flex flex-col shadow-[0_-10px_20px_rgba(0,0,0,0.5)] z-10 relative">
        
        <div class="bg-stone-800 rounded-lg p-2 mb-2 flex justify-between items-center border border-stone-700 h-16">
            <div class="flex-1 flex overflow-x-auto space-x-2 px-2" id="current-assembly">
                <span class="text-stone-500 italic text-sm my-auto">Зберіть замовлення...</span>
            </div>
            <button id="btn-serve" class="bg-green-600 hover:bg-green-500 text-white font-bold h-full px-6 rounded shadow-lg btn-ing uppercase tracking-wider text-sm flex-shrink-0">
                ВИДАТИ
            </button>
        </div>

        <div class="grid grid-cols-4 gap-2 flex-1">
            <button class="bg-stone-700 hover:bg-stone-600 rounded-xl text-3xl shadow-md btn-ing border-b-4 border-stone-800 flex flex-col justify-center items-center" onclick="addIngredient('🥖')">🥖<span class="text-[10px] text-stone-300 uppercase mt-1">Хліб/Булочка</span></button>
            <button class="bg-stone-700 hover:bg-stone-600 rounded-xl text-3xl shadow-md btn-ing border-b-4 border-stone-800 flex flex-col justify-center items-center" onclick="addIngredient('🍗')">🍗<span class="text-[10px] text-stone-300 uppercase mt-1">Курка</span></button>
            <button class="bg-stone-700 hover:bg-stone-600 rounded-xl text-3xl shadow-md btn-ing border-b-4 border-stone-800 flex flex-col justify-center items-center" onclick="addIngredient('🥩')">🥩<span class="text-[10px] text-stone-300 uppercase mt-1">Шинка</span></button>
            <button class="bg-stone-700 hover:bg-stone-600 rounded-xl text-3xl shadow-md btn-ing border-b-4 border-stone-800 flex flex-col justify-center items-center" onclick="addIngredient('🥬')">🥬<span class="text-[10px] text-stone-300 uppercase mt-1">Салат</span></button>
            <button class="bg-stone-700 hover:bg-stone-600 rounded-xl text-3xl shadow-md btn-ing border-b-4 border-stone-800 flex flex-col justify-center items-center" onclick="addIngredient('🧀')">🧀<span class="text-[10px] text-stone-300 uppercase mt-1">Сир</span></button>
            <button class="bg-stone-700 hover:bg-stone-600 rounded-xl text-3xl shadow-md btn-ing border-b-4 border-stone-800 flex flex-col justify-center items-center" onclick="addIngredient('☕')">☕<span class="text-[10px] text-stone-300 uppercase mt-1">Кава</span></button>
            <button class="bg-stone-700 hover:bg-stone-600 rounded-xl text-3xl shadow-md btn-ing border-b-4 border-stone-800 flex flex-col justify-center items-center" onclick="addIngredient('🥛')">🥛<span class="text-[10px] text-stone-300 uppercase mt-1">Молоко</span></button>
            <button class="bg-red-900 hover:bg-red-800 rounded-xl text-xl font-bold shadow-md btn-ing border-b-4 border-red-950 flex flex-col justify-center items-center text-white" onclick="clearAssembly()">❌<span class="text-[10px] uppercase mt-1">Скинути</span></button>
        </div>
    </div>

    <div id="overlay" class="absolute inset-0 bg-black/80 z-50 flex flex-col justify-center items-center text-white p-6 text-center backdrop-blur-sm transition-opacity duration-300">
        <h1 class="text-5xl font-black mb-4 neon-text" id="overlay-title">GLUSCO RUSH</h1>
        <p class="text-lg text-stone-300 mb-6 max-w-sm" id="overlay-desc">Тренування касира. Збирайте замовлення швидко. Видавайте без помилок.</p>
        
        <div class="bg-stone-800 p-4 rounded-lg mb-6 text-left text-sm border border-stone-600 w-full max-w-sm">
            <p class="font-bold text-green-400 mb-2">Рецепти:</p>
            <p>🌯 <b>Врап:</b> Хліб + Курка + Салат</p>
            <p>🥐 <b>Круасан:</b> Хліб + Шинка + Сир</p>
            <p>☕ <b>Капучино:</b> Кава + Молоко</p>
        </div>

        <button onclick="startGame()" class="bg-green-500 hover:bg-green-400 text-stone-900 font-black text-xl py-4 px-12 rounded-full shadow-[0_0_20px_#22c55e] transition transform hover:scale-105 active:scale-95">
            ПОЧАТИ ЗМІНУ
        </button>
    </div>

    <script>
        // --- ПРОЦЕДУРНИЙ АУДІО-ДВИЖОК ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            
            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.05);
                gainNode.gain.setValueAtTime(0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'success') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.setValueAtTime(554, now + 0.1);
                osc.frequency.setValueAtTime(659, now + 0.2);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'error') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'alarm') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.setValueAtTime(600, now + 0.1);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            }
        }

        // --- ЛОГІКА ТА ДАНІ ---
        const RECIPES = [
            { name: "Врап", icon: "🌯", ingredients: ["🥖", "🍗", "🥬"] },
            { name: "Круасан", icon: "🥐", ingredients: ["🥖", "🥩", "🧀"] },
            { name: "Капучино", icon: "☕", ingredients: ["☕", "🥛"] }
        ];

        let state = {
            isPlaying: false,
            score: 0,
            combo: 1,
            timeLeft: 30, // Початковий час
            maxTime: 30,
            currentOrder: null,
            assembly: [],
            lastFrameTime: 0
        };

        // --- ГРАФІЧНИЙ ДВИЖОК (CANVAS API) ---
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let floatingTexts = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = canvas.parentElement.offsetHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Клас для системи частинок (феєрверк успіху)
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 1) * 10 - 2;
                this.life = 1.0;
                this.color = color;
                this.size = Math.random() * 5 + 2;
            }
            update() {
                this.vy += 0.2; // Гравітація
                this.x += this.vx; this.y += this.vy;
                this.life -= 0.02;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        // Клас для спливаючого тексту (очки)
        class FloatingText {
            constructor(x, y, text, color) {
                this.x = x; this.y = y; this.text = text; this.color = color;
                this.life = 1.0;
            }
            update() {
                this.y -= 1; this.life -= 0.02;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.font = "bold 24px Arial";
                ctx.fillText(this.text, this.x, this.y);
                ctx.globalAlpha = 1.0;
            }
        }

        function spawnParticles(x, y) {
            const colors = ['#22c55e', '#eab308', '#fff', '#3b82f6'];
            for(let i=0; i<30; i++) {
                particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]));
            }
        }

        // Головна петля рендерингу (60 FPS)
        function gameLoop(timestamp) {
            const deltaTime = (timestamp - state.lastFrameTime) / 1000;
            state.lastFrameTime = timestamp;

            // Очищення екрану
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (state.isPlaying) {
                // Таймер
                state.timeLeft -= deltaTime;
                if (state.timeLeft <= 0) {
                    gameOver();
                } else if (state.timeLeft < 5 && Math.floor(state.timeLeft * 10) % 5 === 0) {
                    playSound('alarm'); // Сирена, коли мало часу
                }

                // Малювання фону (стійка)
                ctx.fillStyle = '#334155';
                ctx.fillRect(0, canvas.height - 40, canvas.width, 40);

                // Малювання Рахунку та Таймера
                ctx.fillStyle = '#fff'; ctx.font = 'bold 20px sans-serif';
                ctx.fillText(`Рахунок: ${state.score}`, 20, 30);
                ctx.fillText(`Комбо: x${state.combo}`, 20, 60);
                
                // Смуга часу
                ctx.fillStyle = '#374151'; ctx.fillRect(canvas.width - 220, 15, 200, 20);
                ctx.fillStyle = state.timeLeft < 5 ? '#ef4444' : '#22c55e';
                const timeRatio = Math.max(0, state.timeLeft / state.maxTime);
                ctx.fillRect(canvas.width - 220, 15, 200 * timeRatio, 20);

                // Малювання клієнта та замовлення
                if (state.currentOrder) {
                    const cx = canvas.width / 2;
                    const cy = canvas.height / 2 + 20;
                    
                    // Клієнт (Емодзі)
                    ctx.font = '80px Arial'; ctx.textAlign = 'center';
                    ctx.fillText('👤', cx, cy + 40);

                    // Бульбашка замовлення
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.roundRect(cx - 60, cy - 120, 120, 80, 10); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(cx - 10, cy - 40); ctx.lineTo(cx + 10, cy - 40); ctx.lineTo(cx, cy - 20); ctx.fill();
                    
                    // Іконка замовлення
                    ctx.font = '50px Arial';
                    ctx.fillText(state.currentOrder.icon, cx, cy - 60);
                }
            }

            // Оновлення та малювання візуальних ефектів
            particles.forEach((p, index) => { p.update(); p.draw(ctx); if(p.life <= 0) particles.splice(index, 1); });
            floatingTexts.forEach((ft, index) => { ft.update(); ft.draw(ctx); if(ft.life <= 0) floatingTexts.splice(index, 1); });

            requestAnimationFrame(gameLoop);
        }

        // --- ВЗАЄМОДІЯ ТА МЕХАНІКИ ---

        function generateOrder() {
            const recipe = RECIPES[Math.floor(Math.random() * RECIPES.length)];
            state.currentOrder = recipe;
            clearAssembly();
        }

        function updateAssemblyUI() {
            const container = document.getElementById('current-assembly');
            if (state.assembly.length === 0) {
                container.innerHTML = '<span class="text-stone-500 italic text-sm my-auto">Зберіть замовлення...</span>';
            } else {
                container.innerHTML = state.assembly.map(ing => `<div class="bg-stone-700 text-2xl h-10 w-10 flex items-center justify-center rounded shadow">${ing}</div>`).join('');
            }
        }

        function addIngredient(ing) {
            if (!state.isPlaying) return;
            playSound('click');
            if (state.assembly.length < 5) {
                state.assembly.push(ing);
                updateAssemblyUI();
            }
        }

        function clearAssembly() {
            if (!state.isPlaying) return;
            state.assembly = [];
            updateAssemblyUI();
        }

        // Логіка перевірки замовлення
        document.getElementById('btn-serve').addEventListener('click', () => {
            if (!state.isPlaying || !state.currentOrder) return;

            // Порівняння масивів (чи збігаються інгредієнти, незалежно від порядку)
            const required = [...state.currentOrder.ingredients].sort();
            const assembled = [...state.assembly].sort();
            
            const isCorrect = required.length === assembled.length && required.every((val, index) => val === assembled[index]);

            if (isCorrect) {
                // УСПІХ
                playSound('success');
                spawnParticles(canvas.width / 2, canvas.height / 2);
                
                const points = 100 * state.combo;
                state.score += points;
                state.combo++;
                
                // Додаємо трохи часу за успіх, але з кожним разом складніше
                state.timeLeft = Math.min(state.maxTime, state.timeLeft + (5 - state.combo * 0.1));
                
                floatingTexts.push(new FloatingText(canvas.width/2, canvas.height/2 - 50, `+${points}`, '#22c55e'));
                generateOrder();
            } else {
                // ПОМИЛКА
                playSound('error');
                state.combo = 1; // Скидання комбо
                state.timeLeft -= 3; // Штраф часу
                
                floatingTexts.push(new FloatingText(canvas.width/2, canvas.height/2 - 50, "ПОМИЛКА!", '#ef4444'));
                clearAssembly();
                
                // Візуальна тряска екрану (швидкий хак через CSS)
                document.body.style.transform = "translateX(10px)";
                setTimeout(() => document.body.style.transform = "translateX(-10px)", 50);
                setTimeout(() => document.body.style.transform = "translateX(0)", 100);
            }
        });

        // --- СТАН ГРИ ---
        function startGame() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('overlay').classList.add('hidden');
            state = { isPlaying: true, score: 0, combo: 1, timeLeft: 30, maxTime: 30, assembly: [], lastFrameTime: performance.now(), currentOrder: null };
            particles = []; floatingTexts = [];
            generateOrder();
        }

        function gameOver() {
            state.isPlaying = false;
            playSound('error');
            const overlay = document.getElementById('overlay');
            overlay.classList.remove('hidden');
            document.getElementById('overlay-title').innerText = "ЗМІНА ЗАКІНЧЕНА";
            document.getElementById('overlay-title').classList.replace('text-green-400', 'text-red-500');
            document.getElementById('overlay-desc').innerHTML = `Чудова робота! Ваша каса: <br><span class="text-4xl font-black text-yellow-400 mt-2 block">${state.score} балів</span>`;
        }

        // Запуск графічного движка при завантаженні
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
